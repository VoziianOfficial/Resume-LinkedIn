  width="72"
  height="72"
  viewBox="0 0 72 72"
  fill="none"
  role="img"
  aria-labelledby="nimomark-logo-icon-title nimomark-logo-icon-description"
>
  <title id="nimomark-logo-icon-title">NimoMark icon</title>
  <desc id="nimomark-logo-icon-description">
    Geometric letter N inside a vivid circular symbol.
  </desc>

  <defs>
    <linearGradient
      id="nimomark-logo-icon-gradient"
      x1="10"
      y1="8"
      x2="63"
      y2="66"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#FFB15C" />
      <stop offset="0.42" stop-color="#FF5A36" />
      <stop offset="0.72" stop-color="#D64FD8" />
      <stop offset="1" stop-color="#8D63FF" />
    </linearGradient>

    <linearGradient
      id="nimomark-logo-icon-highlight"
      x1="18"
      y1="14"
      x2="50"
      y2="58"
